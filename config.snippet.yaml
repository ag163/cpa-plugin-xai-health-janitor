# Only act on hard failures that CLIProxyAPI recorded from real user traffic.
dry_run: false

# Seconds between passive local status checks. Minimum 30.
interval_seconds: 600

# CPA management endpoint used to delete auth files.
management_base: "http://127.0.0.1:8317"

# REQUIRED for auto-delete. Do not commit real secrets.
management_key: "CHANGE_ME"

# Legacy setting. Active upstream probing is always disabled.
probe_enabled: false
auto_delete: true
delete_status_codes: [401, 402, 403]
providers: ["xai"]

# Do nothing until CLIProxyAPI has observed real recent xAI user traffic.
require_user_traffic: true

# Matching hard failures observed in status/status_message before deletion.
hard_failure_confirmations: 2
